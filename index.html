<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مشاركة الموقع</title>
</head>
<body style="text-align:center; font-family:Arial; padding:40px;">
    <h2>اضغط الزر لمشاركة موقعك الحالي</h2>
    <button onclick="sendLocation()" style="padding:15px 30px; font-size:18px;">📍 إرسال الموقع</button>
    <p id="status"></p>

    <script>
        function sendLocation() {
            if (!navigator.geolocation) {
                document.getElementById("status").innerText = "المتصفح لا يدعم تحديد الموقع.";
                return;
            }
            navigator.geolocation.getCurrentPosition(
                (position) => {
                    fetch("/update", {
                        method: "POST",
                        headers: {"Content-Type": "application/json"},
                        body: JSON.stringify({
                            lat: position.coords.latitude,
                            lng: position.coords.longitude
                        })
                    }).then(res => res.json())
                      .then(() => document.getElementById("status").innerText = "✅ تم الإرسال بنجاح!");
                },
                () => document.getElementById("status").innerText = "❌ تم رفض صلاحية الموقع."
            );
        }
    </script>
</body>
</html>
