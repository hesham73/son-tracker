<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>خريطة الموقع</title>
    <style>iframe{width:100%;height:500px;border:none;}</style>
</head>
<body>
    <h2 style="text-align:center;">📍 آخر موقع تم استلامه: {{ loc.time or "لم يتم الاستلام بعد" }}</h2>
    {% if loc.lat and loc.lng %}
        <iframe src="https://www.google.com/maps?q={{ loc.lat }},{{ loc.lng }}&z=16&output=embed"></iframe>
    {% else %}
        <p style="text-align:center;color:red;">لا توجد بيانات موقع حالياً.</p>
    {% endif %}
</body>
</html>
